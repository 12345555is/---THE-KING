<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE BOSS - ניהול הון</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #111827;
            --accent: #facc15;
            --danger: #ef4444;
            --success: #22c55e;
            --text: #f8fafc;
            --locked: #6366f1;
            --overlay: rgba(0, 0, 0, 0.9);
        }

        body {
            margin: 0; font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        #edit-modal {
            position: fixed; inset: 0; background: var(--overlay); z-index: 2000;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content {
            background: var(--card); width: 100%; max-width: 340px; padding: 25px;
            border-radius: 20px; border: 2px solid var(--accent); box-shadow: 0 0 30px rgba(250, 204, 21, 0.2);
        }

        #login-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }

        .top-status {
            background: var(--card); padding: 15px; text-align: center;
            border-bottom: 2px solid var(--accent); box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .balance-label { font-size: 14px; color: #9ca3af; }
        .balance { font-size: 32px; font-weight: 800; margin: 5px 0; }
        
        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .page { display: none; }
        .page.active { display: block; animation: slideIn 0.2s ease-out; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #1e293b; }
        
        input, select, button {
            width: 100%; padding: 12px; margin: 8px 0;
            border-radius: 10px; border: none; font-size: 16px; box-sizing: border-box;
        }

        input { background: #1f2937; color: white; border: 1px solid #334155; }
        button { background: var(--accent); color: black; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .btn-secondary { background: #334155; color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-lock { background: var(--locked); color: white; }
        
        .nav-tabs {
            position: fixed; bottom: 0; width: 100%;
            background: #1e293b; display: flex;
            height: 75px; border-top: 1px solid var(--accent);
            overflow-x: auto;
        }

        .nav-tab {
            flex: 1; min-width: 65px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-size: 10px; color: #9ca3af; cursor: pointer;
        }

        .nav-tab.active { color: var(--accent); font-weight: bold; }

        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #1e293b; }
        
        .currency-card { display: flex; justify-content: space-around; text-align: center; }
        .currency-item span { display: block; font-weight: bold; font-size: 18px; color: var(--accent); }

        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .calc-btn { background: #1e293b; color: white; padding: 15px; font-size: 18px; margin: 0; }
        #calc-display { background: #0f172a; text-align: left; padding: 15px; font-size: 24px; margin-bottom: 10px; border-radius: 10px; min-height: 35px; color: var(--accent); }

        /* עיצוב הדוח להורדה */
        #report-capture {
            background: white; color: black; padding: 30px; border-radius: 5px;
            width: 400px; position: fixed; left: -9999px; top: 0;
        }
        .report-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .report-table th, .report-table td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        .report-table th { background: #facc15; }
        .edit-icon { color: var(--accent); cursor: pointer; padding: 5px; font-size: 18px; }
    </style>
</head>
<body>

<div id="edit-modal">
    <div class="modal-content" id="modal-container"></div>
</div>

<div id="login-screen">
    <h1 style="color: var(--accent); letter-spacing: 2px;">THE BOSS</h1>
    <input type="password" id="pin-input" inputmode="numeric" placeholder="קוד גישה" style="text-align: center;">
    <button onclick="checkPin()">כניסה למערכת</button>
</div>

<div class="top-status">
    <div class="balance-label">יתרה פנויה לשימוש</div>
    <div id="free-balance" class="balance" style="color: var(--success)">₪0</div>
    <div style="display: flex; justify-content: center; gap: 15px; font-size: 12px; color: #64748b;">
        <span>עתידי: <b id="pending-balance" style="color:var(--accent)">₪0</b></span>
        <span>נעול: <b id="locked-balance" style="color:var(--locked)">₪0</b></span>
    </div>
</div>

<div class="content">
    <div id="home" class="page active">
        <div class="card">
            <h3>פעולה מהירה</h3>
            <input type="number" id="main-amount" placeholder="סכום בשקלים">
            <select id="main-type">
                <option value="income">הכנסה (+)</option>
                <option value="expense">הוצאה (-)</option>
            </select>
            <button onclick="addTransaction()">עדכן יתרה פנויה</button>
        </div>
    </div>

    <div id="savings" class="page">
        <div class="card">
            <h3>נעילת כסף למטרה</h3>
            <input type="text" id="lock-reason" placeholder="מטרה">
            <input type="number" id="lock-amount" placeholder="סכום">
            <button class="btn-lock" onclick="lockMoney()">נעל כסף בצד</button>
        </div>
        <div class="card">
            <h3>כסף נעול</h3>
            <div id="locked-list"></div>
        </div>
    </div>

    <div id="work" class="page">
        <div class="card">
            <h3>מחשבון שכר</h3>
            <div style="display:flex; gap:5px;">
                <input type="time" id="work-start">
                <input type="time" id="work-end">
            </div>
            <input type="number" id="hourly-rate" placeholder="שכר לשעה" value="45">
            <button onclick="calculateWork()">חשב שכר משמרת</button>
            <div id="work-result" style="text-align:center; margin:10px; font-weight:bold;"></div>
            <div id="save-to-work-div" style="display:none">
                <select id="work-select-target"></select>
                <button class="btn-secondary" onclick="addWageToWork()">אוסף לעבודה שנבחרה</button>
            </div>
        </div>
        <div class="card">
            <h3>פירוט שכר עתידי</h3>
            <div id="pending-list-items"></div>
            <button class="btn-secondary" style="margin-top:10px" onclick="addNewWorkPlace()">+ הוסף מקום עבודה</button>
        </div>
    </div>

    <div id="report-page" class="page">
        <div class="card">
            <h3>דוח שעות - רוח שתות</h3>
            <div id="report-list-ui"></div>
            <button onclick="downloadReport()">הורד סיכום 📥</button>
            <button class="btn-danger" onclick="clearReport()">איפוס חודש 🗑️</button>
        </div>
    </div>

    <div id="currency" class="page">
        <div class="card currency-card">
            <div class="currency-item">דולר 🇺🇸 <span id="usd-rate">...</span></div>
            <div class="currency-item">יורו 🇪🇺 <span id="eur-rate">...</span></div>
        </div>
        <div class="card">
            <h3>ממיר מטבעות</h3>
            <input type="number" id="ils-input" placeholder="סכום בשקלים" oninput="convertCurrency()">
            <div id="res-usd" style="text-align:center; color:var(--accent); font-weight:bold; margin-top:10px;"></div>
        </div>
    </div>

    <div id="calculator" class="page">
        <div class="card">
            <div id="calc-display">0</div>
            <div class="calc-grid">
                <button class="calc-btn" onclick="calcClear()">C</button>
                <button class="calc-btn" onclick="calcInput('/')">/</button>
                <button class="calc-btn" onclick="calcInput('*')">*</button>
                <button class="calc-btn" onclick="calcBackspace()">DEL</button>
                <button class="calc-btn" onclick="calcInput('7')">7</button>
                <button class="calc-btn" onclick="calcInput('8')">8</button>
                <button class="calc-btn" onclick="calcInput('9')">9</button>
                <button class="calc-btn btn-secondary" onclick="calcInput('-')">-</button>
                <button class="calc-btn" onclick="calcInput('4')">4</button>
                <button class="calc-btn" onclick="calcInput('5')">5</button>
                <button class="calc-btn" onclick="calcInput('6')">6</button>
                <button class="calc-btn btn-secondary" onclick="calcInput('+')">+</button>
                <button class="calc-btn" onclick="calcInput('1')">1</button>
                <button class="calc-btn" onclick="calcInput('2')">2</button>
                <button class="calc-btn" onclick="calcInput('3')">3</button>
                <button class="calc-btn btn-lock" style="grid-row: span 2;" onclick="calcEqual()">=</button>
                <button class="calc-btn" style="grid-column: span 2;" onclick="calcInput('0')">0</button>
                <button class="calc-btn" onclick="calcInput('.')">.</button>
            </div>
        </div>
    </div>
</div>

<nav class="nav-tabs">
    <div class="nav-tab active" onclick="showPage('home', this)">🏠<br>ראשי</div>
    <div class="nav-tab" onclick="showPage('savings', this)">🔒<br>נעול</div>
    <div class="nav-tab" onclick="showPage('work', this)">🕒<br>עבודה</div>
    <div class="nav-tab" onclick="showPage('report-page', this)">📄<br>דוח</div>
    <div class="nav-tab" onclick="showPage('currency', this)">💹<br>שער</div>
    <div class="nav-tab" onclick="showPage('calculator', this)">🧮<br>מחשבון</div>
</nav>

<div id="report-capture" dir="rtl">
    <h2 style="text-align:center; border-bottom: 2px solid #facc15; padding-bottom: 10px;">סיכום שעות - רוח שתות</h2>
    <table class="report-table">
        <thead>
            <tr>
                <th>תאריך</th>
                <th>שעות</th>
                <th>סה"כ שעות</th>
            </tr>
        </thead>
        <tbody id="report-table-body"></tbody>
    </table>
    <div style="margin-top:20px; text-align:left; font-size:18px;">
        סה"כ שעות לחודש זה: <b id="report-total-hours">0</b>
    </div>
</div>

<script>
    const REAL_PIN = "2157";
    let db = {
        total: parseFloat(localStorage.getItem('total')) || 0,
        lockedItems: JSON.parse(localStorage.getItem('lockedItems')) || [],
        workPlaces: JSON.parse(localStorage.getItem('workPlaces')) || [{ name: "רוח שתות", amount: 0 }, { name: "פיצה המייסדים", amount: 0 }],
        hoursReport: JSON.parse(localStorage.getItem('hoursReport')) || []
    };
    let rates = { USD: 3.65, EUR: 3.95 };

    function checkPin() {
        if(document.getElementById('pin-input').value === REAL_PIN) {
            document.getElementById('login-screen').style.display='none';
            updateUI();
            fetchRates();
        } else if(document.getElementById('pin-input').value.length >= 4) {
            alert("קוד שגוי");
            document.getElementById('pin-input').value = "";
        }
    }

    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        if(el) el.classList.add('active');
        if(id === 'report-page') renderReport();
        if(id === 'work') updateWorkSelect();
    }

    function updateUI() {
        const pendingTotal = db.workPlaces.reduce((s, w) => s + w.amount, 0);
        const lockedTotal = db.lockedItems.reduce((s, i) => s + i.amount, 0);
        document.getElementById('free-balance').innerText = "₪" + db.total.toLocaleString();
        document.getElementById('pending-balance').innerText = "₪" + Math.round(pendingTotal).toLocaleString();
        document.getElementById('locked-balance').innerText = "₪" + lockedTotal.toLocaleString();
        
        document.getElementById('locked-list').innerHTML = db.lockedItems.map(i => `
            <div class="list-item">
                <div><b>${i.reason}</b><br><small style="color:var(--locked)">₪${i.amount}</small></div>
                <button onclick="unlockMoney(${i.id})" style="width:auto; padding:5px 10px;">שחרר</button>
            </div>
        `).join('') || '<div style="text-align:center; color:#64748b;">ריק</div>';

        document.getElementById('pending-list-items').innerHTML = db.workPlaces.map((w, index) => `
            <div class="list-item">
                <span>${w.name}</span>
                <div style="display:flex; gap:10px; align-items:center;">
                    <span style="color:var(--success); font-weight:bold;">₪${w.amount.toFixed(0)}</span>
                    <span class="edit-icon" onclick="openWorkEditModal(${index})">✏️</span>
                    <button class="btn-danger" style="width:auto; padding:2px 8px; margin:0;" onclick="deleteWorkPlace(${index})">🗑️</button>
                </div>
            </div>
        `).join('');

        localStorage.setItem('total', db.total);
        localStorage.setItem('workPlaces', JSON.stringify(db.workPlaces));
        localStorage.setItem('lockedItems', JSON.stringify(db.lockedItems));
        localStorage.setItem('hoursReport', JSON.stringify(db.hoursReport));
    }

    function renderReport() {
        let totalH = 0;
        let html = "";
        let tableHtml = "";
        
        db.hoursReport.forEach((e, index) => {
            totalH += parseFloat(e.total);
            html += `<div class="list-item">
                        <div><small>${e.date}</small><br><b>${e.hours}</b></div>
                        <div style="display:flex; gap:10px; align-items:center;">
                            <span>${e.total} ש'</span>
                            <span class="edit-icon" onclick="openEditModal(${index})">✏️</span>
                        </div>
                    </div>`;
            tableHtml += `<tr><td>${e.date}</td><td>${e.hours}</td><td>${e.total}</td></tr>`;
        });

        document.getElementById('report-list-ui').innerHTML = html || "אין שעות רשומות";
        document.getElementById('report-table-body').innerHTML = tableHtml;
        document.getElementById('report-total-hours').innerText = totalH.toFixed(2);
    }

    function downloadReport() {
        if (db.hoursReport.length === 0) {
            alert("הדוח ריק");
            return;
        }
        const el = document.getElementById('report-capture');
        el.style.left = "0";
        
        html2canvas(el).then(canvas => {
            const base64image = canvas.toDataURL("image/png");
            const link = document.createElement('a');
            link.download = `Report_Ruach_Shtut_${new Date().toLocaleDateString('he-IL')}.png`;
            link.href = base64image;
            link.click();
            el.style.left = "-9999px";
        });
    }

    function clearReport() {
        if(confirm("למחוק הכל?")) {
            db.hoursReport = [];
            renderReport();
            updateUI();
        }
    }

    function calculateWork() {
        const start = document.getElementById('work-start').value, end = document.getElementById('work-end').value, rate = parseFloat(document.getElementById('hourly-rate').value);
        if(!start || !end || !rate) return;
        let s = new Date("2000/01/01 " + start), e = new Date("2000/01/01 " + end);
        if(e < s) e.setDate(e.getDate() + 1);
        let h = (e - s) / 3600000;
        window.lastCalc = h * rate; window.lastHours = h;
        document.getElementById('work-result').innerText = "₪" + window.lastCalc.toFixed(2);
        document.getElementById('save-to-work-div').style.display = 'block';
    }

    function addWageToWork() {
        const idx = document.getElementById('work-select-target').value;
        db.workPlaces[idx].amount += window.lastCalc;
        if(db.workPlaces[idx].name === "רוח שתות") {
            db.hoursReport.push({ 
                date: new Date().toLocaleDateString('he-IL').replace(/\./g, '/'), 
                hours: document.getElementById('work-start').value + "-" + document.getElementById('work-end').value, 
                total: window.lastHours.toFixed(2) 
            });
        }
        document.getElementById('save-to-work-div').style.display = 'none';
        updateUI();
    }

    function openEditModal(index) {
        const entry = db.hoursReport[index];
        const container = document.getElementById('modal-container');
        container.innerHTML = `
            <h3>עריכה</h3>
            <input type="text" id="edit-date" value="${entry.date}">
            <input type="text" id="edit-hours" value="${entry.hours}">
            <input type="number" id="edit-total" value="${entry.total}">
            <button onclick="saveReportEdit(${index})">שמור</button>
            <button class="btn-secondary" onclick="closeModal()">בטל</button>
        `;
        document.getElementById('edit-modal').style.display = 'flex';
    }

    function saveReportEdit(index) {
        db.hoursReport[index] = {
            date: document.getElementById('edit-date').value,
            hours: document.getElementById('edit-hours').value,
            total: parseFloat(document.getElementById('edit-total').value).toFixed(2)
        };
        closeModal(); renderReport(); updateUI();
    }

    function openWorkEditModal(index) {
        const work = db.workPlaces[index];
        const container = document.getElementById('modal-container');
        container.innerHTML = `
            <h3>עריכת שכר: ${work.name}</h3>
            <input type="number" id="edit-work-amount" value="${work.amount.toFixed(0)}">
            <button onclick="saveWorkEdit(${index})">עדכן</button>
            <button class="btn-secondary" onclick="closeModal()">בטל</button>
        `;
        document.getElementById('edit-modal').style.display = 'flex';
    }

    function saveWorkEdit(index) {
        db.workPlaces[index].amount = parseFloat(document.getElementById('edit-work-amount').value) || 0;
        closeModal(); updateUI();
    }

    function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }
    function updateWorkSelect() { document.getElementById('work-select-target').innerHTML = db.workPlaces.map((w,i) => `<option value="${i}">${w.name}</option>`).join(''); }
    function addTransaction() { const amt = parseFloat(document.getElementById('main-amount').value); if(!amt) return; db.total += (document.getElementById('main-type').value === 'income' ? amt : -amt); document.getElementById('main-amount').value = ''; updateUI(); }
    function lockMoney() { const r = document.getElementById('lock-reason').value, a = parseFloat(document.getElementById('lock-amount').value); if(!r || !a || a > db.total) return; db.total -= a; db.lockedItems.push({ reason: r, amount: a, id: Date.now() }); updateUI(); }
    function unlockMoney(id) { const i = db.lockedItems.find(x => x.id === id); db.total += i.amount; db.lockedItems = db.lockedItems.filter(x => x.id !== id); updateUI(); }
    function deleteWorkPlace(i) { if(confirm("למחוק?")) { db.workPlaces.splice(i, 1); updateUI(); } }
    function addNewWorkPlace() { const n = prompt("שם מקום עבודה:"); if(n) { db.workPlaces.push({ name: n, amount: 0 }); updateUI(); } }
    async function fetchRates() { try { const res = await fetch('https://open.er-api.com/v6/latest/ILS'); const data = await res.json(); rates.USD = 1/data.rates.USD; rates.EUR = 1/data.rates.EUR; document.getElementById('usd-rate').innerText = rates.USD.toFixed(2); document.getElementById('eur-rate').innerText = rates.EUR.toFixed(2); } catch(e) {} }
    function convertCurrency() { const ils = parseFloat(document.getElementById('ils-input').value) || 0; document.getElementById('res-usd').innerText = "$" + (ils/rates.USD).toFixed(2) + " | €" + (ils/rates.EUR).toFixed(2); }
    
    let calcVal = "";
    function calcInput(v) { calcVal += v; document.getElementById('calc-display').innerText = calcVal; }
    function calcClear() { calcVal = ""; document.getElementById('calc-display').innerText = "0"; }
    function calcBackspace() { calcVal = calcVal.slice(0, -1); document.getElementById('calc-display').innerText = calcVal || "0"; }
    function calcEqual() { try { calcVal = eval(calcVal).toString(); document.getElementById('calc-display').innerText = calcVal; } catch(e) { calcClear(); } }
</script>
</body>
</html>
