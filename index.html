<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE BOSS - ניהול הון</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #111827;
            --accent: #facc15;
            --danger: #ef4444;
            --success: #22c55e;
            --text: #f8fafc;
            --locked: #6366f1;
        }

        body {
            margin: 0; font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        #login-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }

        .top-status {
            background: var(--card); padding: 15px; text-align: center;
            border-bottom: 2px solid var(--accent); box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .balance-label { font-size: 14px; color: #9ca3af; }
        .balance { font-size: 32px; font-weight: 800; margin: 5px 0; }
        
        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .page { display: none; }
        .page.active { display: block; animation: slideIn 0.2s ease-out; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #1e293b; }
        
        input, select, button {
            width: 100%; padding: 12px; margin: 8px 0;
            border-radius: 10px; border: none; font-size: 16px; box-sizing: border-box;
        }

        input { background: #1f2937; color: white; border: 1px solid #334155; }
        button { background: var(--accent); color: black; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .btn-secondary { background: #334155; color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-lock { background: var(--locked); color: white; }
        
        .nav-tabs {
            position: fixed; bottom: 0; width: 100%;
            background: #1e293b; display: flex;
            height: 70px; border-top: 1px solid var(--accent);
        }

        .nav-tab {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-size: 10px; color: #9ca3af; cursor: pointer;
        }

        .nav-tab.active { color: var(--accent); font-weight: bold; }

        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #1e293b; }
        
        /* עיצוב דוח להורדה */
        #report-capture {
            background: white; color: black; padding: 30px; border-radius: 5px;
            width: 350px; margin: 0 auto; position: absolute; left: -9999px;
        }
        .report-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .report-table th, .report-table td { border-bottom: 1px solid #eee; padding: 10px; text-align: right; }
        
        /* מחשבון */
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .calc-btn { background: #1e293b; color: white; padding: 15px; font-size: 18px; margin: 0; }
        #calc-display { background: #0f172a; text-align: left; padding: 15px; font-size: 24px; margin-bottom: 10px; border-radius: 10px; min-height: 30px; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 style="color: var(--accent); letter-spacing: 2px;">THE BOSS</h1>
    <input type="password" id="pin-input" inputmode="numeric" placeholder="קוד גישה" style="text-align: center;">
    <button onclick="checkPin()">כניסה למערכת</button>
</div>

<div class="top-status">
    <div class="balance-label">יתרה פנויה לשימוש</div>
    <div id="free-balance" class="balance" style="color: var(--success)">₪0</div>
    <div style="display: flex; justify-content: center; gap: 15px; font-size: 12px; color: #64748b;">
        <span>עתידי: <b id="pending-balance" style="color:var(--accent)">₪0</b></span>
        <span>נעול: <b id="locked-balance" style="color:var(--locked)">₪0</b></span>
    </div>
</div>

<div class="content">
    <div id="home" class="page active">
        <div class="card">
            <h3>פעולה מהירה</h3>
            <input type="number" id="main-amount" placeholder="סכום בשקלים">
            <select id="main-type">
                <option value="income">הכנסה (+)</option>
                <option value="expense">הוצאה (-)</option>
            </select>
            <button onclick="addTransaction()">עדכן יתרה פנויה</button>
        </div>
    </div>

    <div id="work" class="page">
        <div class="card">
            <h3>מחשבון שכר</h3>
            <div style="display:flex; gap:5px;">
                <input type="time" id="work-start">
                <input type="time" id="work-end">
            </div>
            <input type="number" id="hourly-rate" placeholder="שכר לשעה">
            <button onclick="calculateWork()">חשב שכר משמרת</button>
            <div id="work-result" style="text-align:center; margin:10px; font-weight:bold;"></div>
            <div id="save-to-work-div" style="display:none">
                <select id="work-select-target"></select>
                <button class="btn-secondary" onclick="addWageToWork()">אוסף לעבודה שנבחרה</button>
            </div>
        </div>
        <div class="card">
            <h3>פירוט שכר עתידי</h3>
            <div id="pending-list-items"></div>
            <button class="btn-secondary" style="margin-top:10px" onclick="addNewWorkPlace()">+ הוסף מקום עבודה</button>
        </div>
    </div>

    <div id="report-page" class="page">
        <div class="card">
            <h3>דוח שעות - רוח שתות</h3>
            <div id="report-list-ui"></div>
            <button onclick="downloadReport()">הורד סיכום לטלפון 📥</button>
            <button class="btn-danger" onclick="clearReport()">איפוס חודש (מחיקה) 🗑️</button>
        </div>
    </div>

    <div id="calculator" class="page">
        <div class="card">
            <div id="calc-display">0</div>
            <div class="calc-grid">
                <button class="calc-btn" onclick="calcClear()">C</button>
                <button class="calc-btn" onclick="calcInput('/')">/</button>
                <button class="calc-btn" onclick="calcInput('*')">*</button>
                <button class="calc-btn" onclick="calcBackspace()">DEL</button>
                <button class="calc-btn" onclick="calcInput('7')">7</button>
                <button class="calc-btn" onclick="calcInput('8')">8</button>
                <button class="calc-btn" onclick="calcInput('9')">9</button>
                <button class="calc-btn btn-lock" onclick="calcInput('-')">-</button>
                <button class="calc-btn" onclick="calcInput('4')">4</button>
                <button class="calc-btn" onclick="calcInput('5')">5</button>
                <button class="calc-btn" onclick="calcInput('6')">6</button>
                <button class="calc-btn btn-lock" onclick="calcInput('+')">+</button>
                <button class="calc-btn" onclick="calcInput('1')">1</button>
                <button class="calc-btn" onclick="calcInput('2')">2</button>
                <button class="calc-btn" onclick="calcInput('3')">3</button>
                <button class="calc-btn btn-lock" style="grid-row: span 2;" onclick="calcEqual()">=</button>
                <button class="calc-btn" style="grid-column: span 2;" onclick="calcInput('0')">0</button>
                <button class="calc-btn" onclick="calcInput('.')">.</button>
            </div>
        </div>
    </div>
</div>

<div id="report-capture" dir="rtl">
    <h2 style="text-align:center; color: #1e293b; border-bottom: 2px solid #facc15; padding-bottom: 10px;">סיכום שעות עבודה - רוח שתות</h2>
    <table class="report-table">
        <thead>
            <tr>
                <th>תאריך</th>
                <th>שעות</th>
                <th>סה"כ</th>
            </tr>
        </thead>
        <tbody id="report-table-body"></tbody>
    </table>
    <div style="margin-top:20px; text-align:left; font-size: 20px; font-weight: bold;">
        סה"כ שעות חודשי: <span id="report-total-hours">0</span>
    </div>
</div>

<nav class="nav-tabs">
    <div class="nav-tab active" onclick="showPage('home', this)">🏠<br>ראשי</div>
    <div class="nav-tab" onclick="showPage('work', this)">🕒<br>עבודה</div>
    <div class="nav-tab" onclick="showPage('report-page', this)">📄<br>דוח</div>
    <div class="nav-tab" onclick="showPage('calculator', this)">🧮<br>חשב</div>
</nav>

<script>
    const REAL_PIN = "2157";
    let db = {
        total: parseFloat(localStorage.getItem('total')) || 0,
        lockedItems: JSON.parse(localStorage.getItem('lockedItems')) || [],
        workPlaces: JSON.parse(localStorage.getItem('workPlaces')) || [
            { name: "רוח שתות", amount: 0 },
            { name: "פיצה המייסדים", amount: 0 }
        ],
        hoursReport: JSON.parse(localStorage.getItem('hoursReport')) || []
    };

    function checkPin() {
        if(document.getElementById('pin-input').value === REAL_PIN) {
            document.getElementById('login-screen').style.display='none';
            updateUI();
        }
        document.getElementById('pin-input').value = '';
    }

    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        if(el) el.classList.add('active');
        if(id === 'work') updateWorkSelect();
        if(id === 'report-page') renderReport();
    }

    function updateUI() {
        const pendingTotal = db.workPlaces.reduce((s, w) => s + w.amount, 0);
        document.getElementById('free-balance').innerText = "₪" + db.total.toLocaleString();
        document.getElementById('pending-balance').innerText = "₪" + Math.round(pendingTotal).toLocaleString();
        
        document.getElementById('pending-list-items').innerHTML = db.workPlaces.map(w => `
            <div class="list-item">
                <span>${w.name}</span>
                <span style="color:var(--success); font-weight:bold;">₪${w.amount.toFixed(0)}</span>
            </div>
        `).join('');

        localStorage.setItem('total', db.total);
        localStorage.setItem('workPlaces', JSON.stringify(db.workPlaces));
        localStorage.setItem('hoursReport', JSON.stringify(db.hoursReport));
    }

    let lastCalc = 0;
    let lastHours = 0;
    function calculateWork() {
        const start = document.getElementById('work-start').value;
        const end = document.getElementById('work-end').value;
        const rate = parseFloat(document.getElementById('hourly-rate').value);
        if(!start || !end || !rate) return;
        let s = new Date("2000/01/01 " + start);
        let e = new Date("2000/01/01 " + end);
        if(e < s) e.setDate(e.getDate() + 1);
        lastHours = (e - s) / 3600000;
        lastCalc = lastHours * rate;
        document.getElementById('work-result').innerText = "₪" + lastCalc.toFixed(2) + " (" + lastHours.toFixed(2) + " שעות)";
        document.getElementById('save-to-work-div').style.display = 'block';
        updateWorkSelect();
    }

    function updateWorkSelect() {
        const sel = document.getElementById('work-select-target');
        if(sel) sel.innerHTML = db.workPlaces.map((w,i) => `<option value="${i}">${w.name}</option>`).join('');
    }

    function addWageToWork() {
        const idx = document.getElementById('work-select-target').value;
        const workName = db.workPlaces[idx].name;
        
        db.workPlaces[idx].amount += lastCalc;

        // אם זו רוח שתות - תוסיף לדוח השעות
        if(workName === "רוח שתות") {
            const today = new Date().toLocaleDateString('he-IL');
            const startTime = document.getElementById('work-start').value;
            const endTime = document.getElementById('work-end').value;
            db.hoursReport.push({
                date: today,
                hours: `${startTime}-${endTime}`,
                total: lastHours.toFixed(2)
            });
        }

        document.getElementById('save-to-work-div').style.display = 'none';
        document.getElementById('work-result').innerText = "נשמר בהצלחה! ✅";
        updateUI();
    }

    function renderReport() {
        const listUi = document.getElementById('report-list-ui');
        const tableBody = document.getElementById('report-table-body');
        let totalHours = 0;

        let html = db.hoursReport.map(entry => {
            totalHours += parseFloat(entry.total);
            return `<div class="list-item"><span>${entry.date}</span><span>${entry.hours}</span><b>${entry.total} שעות</b></div>`;
        }).join('') || '<div style="text-align:center; padding:20px;">אין שעות רשומות</div>';
        
        listUi.innerHTML = html + `<div style="text-align:left; margin-top:10px; font-size:18px;">סה"כ שעות: <b>${totalHours.toFixed(2)}</b></div>`;
        
        // עדכון הטבלה הנסתרת לצילום
        tableBody.innerHTML = db.hoursReport.map(entry => `
            <tr><td>${entry.date}</td><td>${entry.hours}</td><td>${entry.total}</td></tr>
        `).join('');
        document.getElementById('report-total-hours').innerText = totalHours.toFixed(2);
    }

    function clearReport() {
        if(confirm("בטוח שאתה רוצה למחוק את כל השעות של החודש?")) {
            db.hoursReport = [];
            // מאפס גם את היתרה העתידית של רוח שתות
            const idx = db.workPlaces.findIndex(w => w.name === "רוח שתות");
            if(idx !== -1) db.workPlaces[idx].amount = 0;
            updateUI();
            renderReport();
        }
    }

    function downloadReport() {
        const capture = document.getElementById('report-capture');
        capture.style.left = "0"; // מציג זמנית לצילום
        html2canvas(capture).then(canvas => {
            const link = document.createElement('a');
            link.download = `דוח_שעות_${new Date().getMonth()+1}.png`;
            link.href = canvas.toDataURL();
            link.click();
            capture.style.left = "-9999px"; // מחזיר להסתרה
        });
    }

    function addTransaction() {
        const amt = parseFloat(document.getElementById('main-amount').value);
        if(!amt) return;
        db.total += (document.getElementById('main-type').value === 'income' ? amt : -amt);
        document.getElementById('main-amount').value = '';
        updateUI();
    }

    function addNewWorkPlace() {
        const name = prompt("שם מקום העבודה החדש:");
        if(name) { db.workPlaces.push({name: name, amount: 0}); updateUI(); }
    }

    let calcVal = "";
    function calcInput(v) { calcVal += v; document.getElementById('calc-display').innerText = calcVal; }
    function calcClear() { calcVal = ""; document.getElementById('calc-display').innerText = "0"; }
    function calcBackspace() { calcVal = calcVal.slice(0,-1); document.getElementById('calc-display').innerText = calcVal || "0"; }
    function calcEqual() { try { calcVal = eval(calcVal).toString(); document.getElementById('calc-display').innerText = calcVal; } catch(e) { calcClear(); } }
</script>
</body>
</html>
